name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Create server .env
      working-directory: ./shopsmart/server
      run: |
        echo "PORT=4000" > .env
        echo "CLIENT_URL=http://localhost:3000" >> .env
        echo "DATABASE_URL=postgresql://neondb_owner:npg_QYjT8IBzgh7W@ep-icy-hall-ad4y9imn-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require" >> .env
    - name: Create client .env.local
      working-directory: ./shopsmart/client
      run: |
        echo "NEXT_PUBLIC_API_URL=http://localhost:4000/api" > .env.local
    - name: Install server dependencies
      working-directory: ./shopsmart/server
      run: npm ci
    - name: Install client dependencies
      working-directory: ./shopsmart/client
      run: npm ci
    - name: Install Playwright Browsers
      working-directory: ./shopsmart/client
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      working-directory: ./shopsmart/client
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: shopsmart/playwright-report/
        retention-days: 30
